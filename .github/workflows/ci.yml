name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      INFERENCE_MODE: shadow

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      INFERENCE_MODE: shadow

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration -- --passWithNoTests

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      INFERENCE_MODE: shadow

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for known vulnerabilities
        run: npm audit --audit-level=high

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ── Phase 3: CV Engine Docker Build & Size Gate ──────────────────────────
  cv-docker-build:
    name: CV Docker Build (CPU mode + size gate)
    runs-on: ubuntu-latest
    # pace-cv-engine/ に変更がある場合のみ実行（コスト最適化）
    # main/develop への push・PR 時は常時実行
    defaults:
      run:
        working-directory: ../pace-cv-engine

    steps:
      - uses: actions/checkout@v4
        with:
          # pace-cv-engine はサブディレクトリではなく兄弟リポジトリのため
          # モノレポ構成に移行した場合はここを調整する
          fetch-depth: 0

      - name: Check if pace-cv-engine exists
        id: cv_exists
        run: |
          if [ -d "${{ github.workspace }}/../pace-cv-engine" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::pace-cv-engine directory not found. Skipping CV Docker build."
          fi
        working-directory: ${{ github.workspace }}

      - name: Build CV Engine Docker image (CPU target)
        if: steps.cv_exists.outputs.exists == 'true'
        run: |
          docker build \
            --target cpu \
            --tag pace-cv-engine:ci-test \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
        working-directory: ${{ github.workspace }}/../pace-cv-engine
        env:
          DOCKER_BUILDKIT: '1'

      - name: Gate: Verify image size <= 4GB
        if: steps.cv_exists.outputs.exists == 'true'
        run: |
          IMAGE_SIZE=$(docker image inspect pace-cv-engine:ci-test \
            --format='{{.Size}}' | awk '{printf "%.2f", $1/1024/1024/1024}')
          echo "CV Engine image size: ${IMAGE_SIZE} GB"
          # 4GB = 4294967296 bytes
          SIZE_BYTES=$(docker image inspect pace-cv-engine:ci-test --format='{{.Size}}')
          if [ "$SIZE_BYTES" -gt "4294967296" ]; then
            echo "::error::CV Engine image size ${IMAGE_SIZE}GB exceeds 4GB limit!"
            echo "::error::Reduce dependencies in requirements.txt or use multi-stage build optimization."
            exit 1
          fi
          echo "::notice::Image size ${IMAGE_SIZE}GB is within the 4GB limit."

      - name: Smoke test: /health endpoint (MediaPipe CPU mode)
        if: steps.cv_exists.outputs.exists == 'true'
        run: |
          # コンテナをバックグラウンドで起動
          docker run -d \
            --name cv-engine-test \
            -p 8000:8000 \
            -e MEDIAPIPE_CPU_ONLY=true \
            -e SUPABASE_URL=http://localhost \
            -e SUPABASE_SERVICE_ROLE_KEY=test-key \
            pace-cv-engine:ci-test
          # ヘルスチェックが通るまで最大 30 秒待機
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "::notice::Health check passed after ${i}s"
              break
            fi
            sleep 1
          done
          # 最終確認
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "Health response: ${RESPONSE}"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Health check failed. status=${STATUS}"
            docker logs cv-engine-test
            exit 1
          fi
          docker stop cv-engine-test
          docker rm cv-engine-test

  # ── Phase 3: Python CV Engine Unit Tests ─────────────────────────────────
  cv-python-tests:
    name: CV Engine Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pace-cv-engine

    steps:
      - uses: actions/checkout@v4

      - name: Check if pace-cv-engine exists
        id: cv_exists
        working-directory: ${{ github.workspace }}
        run: |
          if [ -d "pace-cv-engine" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::pace-cv-engine not found. Skipping Python tests."
          fi

      - name: Setup Python 3.11
        if: steps.cv_exists.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pace-cv-engine/requirements.txt

      - name: Install dependencies (CPU-only)
        if: steps.cv_exists.outputs.exists == 'true'
        run: |
          pip install --upgrade pip
          # Install CPU-only OpenCV (no display required in CI)
          pip install \
            fastapi==0.111.0 \
            "uvicorn[standard]==0.30.1" \
            mediapipe==0.10.14 \
            opencv-python-headless==4.10.0.84 \
            numpy==1.26.4 \
            pydantic==2.7.4 \
            pydantic-settings==2.3.4 \
            httpx==0.27.0 \
            structlog==24.2.0 \
            pytest==8.2.2 \
            pytest-asyncio==0.23.7 \
            pytest-cov==5.0.0

      - name: Run Python unit tests
        if: steps.cv_exists.outputs.exists == 'true'
        env:
          ENVIRONMENT: test
          S3_RAW_BUCKET: test-raw-bucket
          S3_MASKED_BUCKET: test-masked-bucket
          SQS_JOB_QUEUE_URL: https://sqs.ap-northeast-1.amazonaws.com/000000/test.fifo
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing \
            --tb=short -x

      - name: Upload Python coverage
        if: steps.cv_exists.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cv-engine-coverage
          path: pace-cv-engine/coverage.xml
          retention-days: 7
