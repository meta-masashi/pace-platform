name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. DB マイグレーション（最初に実行 — スキーマ変更を先に適用） ──────
  migrate-database:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Sync migration history
        run: |
          # schema_migrations をローカルファイルと完全に同期する。
          # 1. 管理 API 経由で既存エントリをすべて削除（孤立バージョンを排除）
          # 2. ローカルファイルの数値プレフィックスを applied として登録
          # これにより db push は新規ファイルのみを対象にする。
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          MGMT_API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"

          echo "Truncating schema_migrations..."
          curl -s -X POST "$MGMT_API" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"TRUNCATE supabase_migrations.schema_migrations"}' || true

          echo "Registering local migration files..."
          for f in supabase/migrations/*.sql; do
            ver=$(basename "$f" .sql | grep -oE '^[0-9]+')
            [ -z "$ver" ] && continue
            echo "  applied: ${ver}"
            supabase migration repair --status applied "$ver" || true
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Push DB migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── 2. フロントエンド デプロイ ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy to Vercel
    needs: migrate-database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          cd pace-platform
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health check (frontend)
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.NEXT_PUBLIC_SITE_URL }}/auth/login" || echo "000")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Frontend health check passed (HTTP ${STATUS})"
          else
            echo "Frontend health check FAILED (HTTP ${STATUS})"
            exit 1
          fi

  # ── 3. Edge Functions デプロイ ───────────────────────────────────────────
  deploy-edge-functions:
    name: Deploy Supabase Edge Functions
    needs: migrate-database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy dunning-cron
        run: supabase functions deploy dunning-cron --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy stripe-webhook
        run: supabase functions deploy stripe-webhook --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy embed-documents
        run: supabase functions deploy embed-documents
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy daily-decay-batch
        run: supabase functions deploy daily-decay-batch
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy dbn-predict
        run: supabase functions deploy dbn-predict
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy invite-staff
        run: supabase functions deploy invite-staff
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy morning-notification
        run: supabase functions deploy morning-notification
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy phi-audit-log
        run: supabase functions deploy phi-audit-log
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy weekly-learning-batch
        run: supabase functions deploy weekly-learning-batch
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── 4. デプロイ完了通知 ─────────────────────────────────────────────────
  notify:
    name: Notify Deploy Result
    needs: [deploy-frontend, deploy-edge-functions]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FRONTEND_STATUS="${{ needs.deploy-frontend.result }}"
          EDGE_STATUS="${{ needs.deploy-edge-functions.result }}"
          EMOJI="white_check_mark"
          if [ "$FRONTEND_STATUS" != "success" ] || [ "$EDGE_STATUS" != "success" ]; then
            EMOJI="x"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\":${EMOJI}: PACE Deploy — Frontend: ${FRONTEND_STATUS} / Edge Functions: ${EDGE_STATUS} — ${GITHUB_SHA:0:7}\"}" || true
