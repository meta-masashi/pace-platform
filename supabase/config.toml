# ========================================
# PACE v3.0 — Supabase 設定ファイル
# ========================================
# 注意: 本番プロジェクトの設定は Supabase ダッシュボードで管理する。
# このファイルはローカル開発環境 (supabase start) 用の設定。
# ========================================

[api]
# ローカル開発用 API ポート
port = 54321
# スキーマ公開設定
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# ローカル開発用 DB ポート
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
# ローカル開発用メール確認サービス
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# ファイルアップロード上限（動画サポートのため 500MB に拡張）
file_size_limit = "524288000"  # 500MB

# ----------------------------------------
# Storage バケット定義
# ----------------------------------------
# 注意: バケット作成は Supabase ダッシュボード → Storage から手動で行うこと
#
# [1] videos バケット
#   - 用途: CV 解析済みマスク動画（顔マスキング済み）・ビフォーアフター動画
#   - アクセス: private（認証済みユーザーのみ）
#   - ファイル形式: video/mp4, video/quicktime
#   - 最大ファイルサイズ: 500MB
#   - 補足: 元動画（raw）は AWS S3 に直接アップロード。Supabase Storage には
#           顔マスキング済み動画のみ保存する。
#
# [2] thumbnails バケット
#   - 用途: CV 解析結果サムネイル・選手プロフィール写真
#   - アクセス: private（認証済みユーザーのみ）
#   - ファイル形式: image/jpeg, image/png, image/webp
#   - 最大ファイルサイズ: 10MB
#
# ----------------------------------------

[auth]
enabled = true
# JWT 有効期限: 1時間（セキュリティ設計: HIPAA準拠）
jwt_expiry = 3600
# リフレッシュトークン有効期限: 7日
refresh_token_rotation_enabled = true
security_update_password_require_reauthentication = true

# メール認証
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# TOTP（2FA）設定
[auth.mfa]
max_enrolled_factors = 2

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# パスワードポリシー
[auth.password]
min_length = 12

# ========================================
# Realtime 設定
# 用途: ダッシュボードのリアルタイム更新
#       - 選手チェックイン通知
#       - CV 解析ジョブステータス更新
#       - コミュニティメッセージ配信
# ========================================
[realtime]
enabled = true
ip_version = "IPv6"

# ========================================
# Edge Functions 設定
# デプロイは: supabase functions deploy <function-name>
# ========================================
[functions]
# 予定 Edge Functions:
#   - pace-engine      : ベイズ推論エンジン呼び出し（Python マイクロサービス中継）
#   - cv-job-trigger   : CV 解析ジョブの非同期トリガー（AWS SQS 連携）
#   - gemini-proxy     : Gemini API 呼び出しプロキシ（API キー保護）
#   - audit-logger     : 全操作の監査ログ自動記録
#   - notification     : スタッフへのプッシュ通知送信
verify_jwt = true
